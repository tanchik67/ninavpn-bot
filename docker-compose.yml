services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ninavpn
      POSTGRES_PASSWORD: ninavpn
      POSTGRES_DB: ninavpn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ninavpn -d ninavpn"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      SAAS_DATABASE_URL: postgresql+asyncpg://ninavpn:ninavpn@postgres:5432/ninavpn
      REDIS_URL: redis://redis:6379/0
      API_CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m apps.worker.main
    env_file:
      - .env
    environment:
      SAAS_DATABASE_URL: postgresql+asyncpg://ninavpn:ninavpn@postgres:5432/ninavpn
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
