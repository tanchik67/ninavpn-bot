## NINAVPN — nginx vhost for ninavpn.store
##
## What this does:
## - Terminates HTTPS (Let’s Encrypt certs)
## - Proxies bot HTTP app (aiohttp) from localhost:8080 to:
##   - /payment/*  (T-Bank webhook, Freekassa IPN, success/fail pages)
##   - /miniapp/*  (Telegram Mini App + API + static)
##   - /geo/*      (optional v2ray geo dat files)
##
## Prereqs:
## - DNS A record: ninavpn.store -> 2.27.122.201
## - certbot has issued cert for ninavpn.store
## - bot runs on the same server and listens on 127.0.0.1:8080 (see main.py)
## - SaaS API (uvicorn) on 127.0.0.1:8000 — see deploy/systemd/ninavpn-api.service
##
## Install example (Ubuntu/Debian):
##   sudo cp deploy/nginx/ninavpn.store.conf /etc/nginx/sites-available/ninavpn.store
##   sudo ln -s /etc/nginx/sites-available/ninavpn.store /etc/nginx/sites-enabled/ninavpn.store
##   sudo nginx -t && sudo systemctl reload nginx
##

server {
    listen 80;
    listen [::]:80;
    server_name ninavpn.store;

    # Needed for certbot HTTP-01 challenge.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ninavpn.store;

    # Let’s Encrypt paths (certbot will create/manage these).
    ssl_certificate     /etc/letsencrypt/live/ninavpn.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ninavpn.store/privkey.pem;

    # Reasonable defaults
    client_max_body_size 10m;

    # Health check (optional)
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # --- SaaS FastAPI (JWT cabinet / Expo) ---
    location ^~ /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location = /health {
        proxy_pass         http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # --- Bot HTTP app reverse proxy (localhost only) ---
    # payment/*: T-Bank webhook + success/fail pages
    location ^~ /payment/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
        proxy_connect_timeout 5s;
    }

    # miniapp/*: Telegram Mini App (HTML + API + static)
    location ^~ /miniapp/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
        proxy_connect_timeout 5s;
    }

    # api/checkout/*: оплата Т-Банком с лендинга
    location ^~ /api/checkout/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # geo/*: optional v2ray geo files (can be disabled in .env)
    location ^~ /geo/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Лендинг и юридические страницы (файлы в /opt/ninavpn-bot/site на сервере)
    root /opt/ninavpn-bot/site;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

