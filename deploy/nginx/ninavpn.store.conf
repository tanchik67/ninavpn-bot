## NINAVPN — nginx vhost for ninavpn.store
##
## - HTTPS (Let’s Encrypt) + Cloudflare Flexible-safe :80
## - Static landing from /opt/ninavpn-bot/site
## - Bot aiohttp :8080 — /payment /miniapp /geo /api/checkout
## - SaaS FastAPI :8000 — /api/v1 /health
##
## Prereqs:
## - DNS A: ninavpn.store -> VPS IP (Cloudflare orange-cloud ok)
## - certbot certs for ninavpn.store
## - /opt/ninavpn-bot must be traversable by www-data: chmod 711 /opt/ninavpn-bot
##
## Install:
##   sudo cp deploy/nginx/ninavpn.store.conf /etc/nginx/sites-available/ninavpn.store
##   sudo ln -sf /etc/nginx/sites-available/ninavpn.store /etc/nginx/sites-enabled/ninavpn.store
##   sudo nginx -t && sudo systemctl reload nginx

# Shared proxy snippets would be overkill — keep explicit locations.

server {
    listen 80;
    listen [::]:80;
    server_name ninavpn.store;

    # Cloudflare Flexible SSL terminates TLS at CF and talks HTTP to origin.
    # Serving content on :80 avoids redirect loops for the landing page.

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location ^~ /api/checkout/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location ^~ /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass         http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location ^~ /payment/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ^~ /miniapp/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ^~ /geo/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    root /opt/ninavpn-bot/site;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html =404;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ninavpn.store;

    ssl_certificate     /etc/letsencrypt/live/ninavpn.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ninavpn.store/privkey.pem;

    client_max_body_size 10m;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Longer prefix wins over /api/ for site checkout (bot).
    location ^~ /api/checkout/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location ^~ /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass         http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location ^~ /payment/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location ^~ /miniapp/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location ^~ /geo/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    root /opt/ninavpn-bot/site;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html =404;
    }
}
